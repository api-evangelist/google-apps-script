aid: google-apps-script
name: Google Apps Script
description: >-
  The Apps Script API provides programmatic access to manage Google Apps Script
  projects, deployments, and executions. It enables creating and updating script
  projects, managing project versions and deployments, monitoring script
  processes, and remotely executing Apps Script functions. The API is essential
  for automating Apps Script project management and integrating script execution
  into external applications.
